# Cloudflare Pages config for the ADMIN app (apps/admin) only.
# Used by `wrangler pages dev` (local preview) and `wrangler pages deploy`.
# The same compatibility settings must also be set in the Cloudflare dashboard
# (Pages → project → Settings → Functions) — see DEPLOYMENT.md.
name = "hamza-admin"
compatibility_date = "2024-12-30"
# nodejs_compat lets the Workers runtime polyfill the Node built-ins that
# Next.js / its deps expect. Required by @cloudflare/next-on-pages.
compatibility_flags = ["nodejs_compat"]
# Build output produced by `@cloudflare/next-on-pages`.
pages_build_output_dir = ".vercel/output/static"
